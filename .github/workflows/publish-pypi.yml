name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    branches:
      - 'release/**'

jobs:
  pypi-publish:
    name: Build and publish Python distribution to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/workstate
    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Extract and Update Version
        run: |
          VERSION_RAW="${{ github.ref_name }}"
          # Extrai apenas o padrão x.x.x (removendo 'v' ou prefixos de branch)
          VERSION=$(echo "$VERSION_RAW" | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -n 1)
          if [ -z "$VERSION" ]; then
            echo "❌ Could not extract version from $VERSION_RAW"
            exit 1
          fi
          echo "🚀 Using version: $VERSION"
          python scripts/update_version.py "$VERSION"

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
